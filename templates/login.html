{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <h2>🔑 {{ get_text('login', lang) }}</h2>
    <form method="POST">
        <div>
            <label>{{ get_text('username', lang) }}</label>
            <input type="text" name="username" required placeholder="{{ get_text('username', lang) }}">
        </div>
        <div>
            <label>{{ get_text('password', lang) }}</label>
            <input type="password" name="password" required placeholder="{{ get_text('password', lang) }}">
        </div>
        <div style="margin-top: 1rem;">
            <button type="submit" class="button">{{ get_text('login', lang) }}</button>
        </div>
    </form>
    <p style="margin-top: 1rem;">
        {% if lang == 'ru' %}
            Нет аккаунта? <a href="{{ url_for('register') }}">{{ get_text('register', lang) }}</a>
        {% else %}
            Don't have an account? <a href="{{ url_for('register') }}">{{ get_text('register', lang) }}</a>
        {% endif %}
    </p>
</div>
{% endblock %}
